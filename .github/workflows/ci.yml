name: CI

on:
  push:
    branches: [main, arquitectura-plataforma]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff mypy httpx beautifulsoup4 openpyxl pyyaml

      - name: Lint with ruff
        run: ruff check src/ herramientas/ tests/ --quiet

      - name: Type check with mypy
        run: mypy src/ herramientas/ tests/ --ignore-missing-imports || true

      - name: Test with pytest
        run: python -m pytest -q tests/ herramientas/cotizacion/tests proyectos/renzo/tests

  verify-ampacity-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate ampacidades.yaml
        run: |
          pip install pyyaml
          python -c "
          import yaml
          with open('herramientas/calculos/datos/ampacidades.yaml') as f:
              data = yaml.safe_load(f)
          assert 'cobre' in data, 'Missing cobre'
          assert 'aluminio' in data, 'Missing aluminio'
          assert 'ducto' in data['cobre'], 'Missing cobre.ducto'
          assert 'ducto' in data['aluminio'], 'Missing aluminio.ducto'
          assert 'itm_estandar_a' in data, 'Missing itm_estandar_a'
          assert 2.5 in data['cobre']['ducto'], 'Missing 2.5mm2 Cu'
          assert data['cobre']['ducto'][2.5] == 20, 'Cu 2.5mm2 should be 20A'
          print('ampacidades.yaml validado correctamente')
          "
